diffuser_inference:
  ros__parameters:
    # Model selection: "ours" (with GAT) or "baseline" (original DiffuserActor)

    # model_type: "lie"
    # checkpoint: "/home/user/RoboBounce/train_logs/lie_model2_100000.pth"

    model_type: "ours"
    # checkpoint: "/home/user/RoboBounce/train_logs/mix_no_norm_100000.pth"
    checkpoint: "/home/user/RoboBounce/train_logs/put_block_and_cups/checkpoint_120000.pth"

    # model_type: "baseline"
    # checkpoint: "/home/user/RoboBounce/train_logs/mix_inter_baseline_100000.pth"

    instruction: "Stack the cups."
    # instruction: "Move the doll to the platform."
    # instruction:  "Sort the block."
    # instruction: "Place the block inside the box."
    inference_rate: 4.0
    control_rate: 3.0
    trajectory_steps: 20
    z_min: 0.21  # Minimum z height (world frame) — set to current EE height
    input_rgbd_topic: "/camera/camera/rgbd"
    gripper_width_topic: "/rg2/gripper_width"
    joint_base_names: 
      - "shoulder_link"
      - "forearm_link"
      - "wrist_1_link"
      - "wrist_2_link"
      - "rg2_base_link"
    base_frame_id: "world"

    # Faster inference options
    inference_diffusion_timesteps: 100

    # Movement-based history capture (matching training preprocessing)
    history_capture_rate: 10.0  # Hz, rate to check for movement
    history_pos_thresh: 0.05  # 5cm position threshold (same as preprocessing)
    history_rot_thresh_deg: 3.0  # 3 degrees rotation threshold (same as preprocessing)
    history_gripper_thresh: 0.1  # 10% gripper change threshold (same as preprocessing)

    # Gripper close wait (pause when grasping)
    gripper_close_wait_duration: 2.0  # Seconds to wait when gripper closes (open → close)
    # gripper_close_wait_duration: 0.0  # Seconds to wait when gripper closes (open → close)


    # Metrics output
    save_metrics: false  # Enable/disable file output
    metrics_dir: "eval_metrics"  # Where to save files
